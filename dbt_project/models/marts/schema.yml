version: 2

models:
  - name: metricflow_time_spine
    description: "MetricFlow 用タイムスパインモデル (2010-01-01 〜 2030-12-31 の日次)"
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day

  - name: orders
    description: "注文マートモデル - MetricFlowセマンティックモデルのベース"
    columns:
      - name: order_id
        description: "注文ID (主キー)"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: order_amount
        tests:
          - not_null

  - name: customers
    description: "顧客マートモデル - MetricFlowセマンティックモデルのベース"
    columns:
      - name: customer_id
        description: "顧客ID (主キー)"
        tests:
          - unique
          - not_null
